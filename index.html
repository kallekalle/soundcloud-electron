<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link href="./styles.css" rel="stylesheet">
  <title>SoundCloud</title>
</head>

<body>
  <div class="titlebar">
    <div id="toolbar">
      <button id="back" class="icon-btn" onclick="window.electronAPI.nav.back()">
        <img src="assets/backbutton.png">
      </button>
      <button id="forward" class="icon-btn" onclick="window.electronAPI.nav.forward()">
        <img src="assets/forwardbutton.png">
      </button>
      <button class="icon-btn" onclick="window.electronAPI.nav.reload()">
        <img src="assets/refreshbutton.png">
      </button>
      <button id="genius-toggle" class="genius-btn" type="button">
       <img src="assets/genius2.png"> 
      </button>
    </div>
  </div>
  <div id="topblock"></div>

  <script>
    const geniusToggleButton = document.getElementById('genius-toggle');

    geniusToggleButton.addEventListener('click', () => {
      window.electronAPI.toggleGeniusWindow();
    });
  </script>
</body>

</html>
